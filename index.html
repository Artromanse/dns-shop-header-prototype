<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNS Header — Shop Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-page:#ececec;
    --bg-secondary:#ffffff;
    --bg-input-gray:#f7f7f7;
    --text-primary:#333333;
    --text-secondary:#4e4e4e;
    --text-tertiary:#7d7c7c;
    --text-placeholder:#8c8c8c;
    --brand-orange:#ffa319;
    --brand-dark:#fc8507;
    --brand-gradient:linear-gradient(116.54deg,#fc8507 3.97%,#ffa218 102.81%);
    --brand-gradient-hover:linear-gradient(116.54deg,#ff9741 3.97%,#ffb14a 102.81%);
    --brand-gradient-active:linear-gradient(116.54deg,#f07d05 3.97%,#f59512 102.81%);
    --icon-primary:#a7a5a5;
    --stroke-light:#eeeeee;
    --controls-hover-gray:#eae8e8;
    --controls-active-gray:#e0dede;
    --radius:12px;
    --radius-small:8px;
    --shadow-header:0 4px 18px rgba(0,0,0,.10);
    --focus-ring:0 0 0 3px rgba(252,133,7,.22);
  }

  *{box-sizing:border-box;}
  html,body{min-height:100%;}
  body{
    margin:0;
    font-family:'PT Sans',Arial,sans-serif;
    background:var(--bg-page);
    color:var(--text-primary);
    -webkit-font-smoothing:antialiased;
  }

  button,
  input{
    font:inherit;
  }

  button{
    border:0;
    cursor:pointer;
  }

  .page{
    min-height:100vh;
    padding:42px 0;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
  }

  .viewport{
    width:100%;
    overflow-x:auto;
    padding:0 24px 14px;
  }

  .header-shell{
    width:min(1660px,calc(100vw - 260px));
    min-width:1380px;
    margin:0 auto;
    background:var(--bg-secondary);
    border-radius:0 0 var(--radius) var(--radius);
    box-shadow:var(--shadow-header);
  }

  .top-row{
    max-width:1380px;
    height:40px;
    margin:0 auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:24px;
    color:var(--text-secondary);
    font-size:14px;
    line-height:18px;
    white-space:nowrap;
  }

  .top-left,
  .top-right,
  .locale,
  .location,
  .nav-link,
  .dropdown-link{
    display:flex;
    align-items:center;
  }

  .top-left{
    min-width:0;
    gap:20px;
  }

  .locale{
    gap:6px;
  }

  .flag{
    width:22px;
    height:14px;
    display:block;
    border-radius:3px;
    object-fit:cover;
  }

  .chevron{
    width:16px;
    height:16px;
    display:block;
  }

  .location{
    gap:6px;
    font-weight:700;
  }

  .location img{
    width:16px;
    height:16px;
    display:block;
  }

  .nav{
    display:flex;
    align-items:center;
    gap:20px;
    min-width:0;
  }

  .nav-link,
  .dropdown-link{
    position:relative;
    gap:4px;
    color:var(--text-secondary);
    text-decoration:none;
    border-radius:6px;
    transition:color .16s ease,background .16s ease;
  }

  .nav-link:hover,
  .dropdown-link:hover{
    color:var(--brand-dark);
  }

  .video-dot{
    width:5px;
    height:5px;
    border-radius:50%;
    background:var(--brand-orange);
    position:absolute;
    right:-6px;
    top:1px;
  }

  .phone{
    color:var(--text-secondary);
    text-decoration:none;
    font-weight:700;
    letter-spacing:.1px;
  }

  .bottom-row{
    max-width:1380px;
    height:80px;
    margin:0 auto;
    padding:8px 0 16px;
    display:flex;
    align-items:center;
    gap:12px;
  }

  .brand-catalog{
    width:280px;
    height:64px;
    padding:0 14px 0 18px;
    display:flex;
    align-items:center;
    gap:18px;
    border-radius:var(--radius);
    background:var(--brand-gradient);
    color:#fff;
    box-shadow:0 4px 12px rgba(252,133,7,.20);
    transition:background .16s ease,transform .16s ease,box-shadow .16s ease;
  }

  .brand-catalog:hover{
    background:var(--brand-gradient-hover);
    box-shadow:0 6px 16px rgba(252,133,7,.24);
  }

  .brand-catalog:active{
    background:var(--brand-gradient-active);
    transform:translateY(1px);
  }

  .brand-logo{
    width:88px;
    height:28px;
    flex:0 0 auto;
    display:block;
  }

  .catalog-divider{
    width:1px;
    height:32px;
    background:rgba(255,255,255,.28);
  }

  .catalog-label{
    display:flex;
    align-items:center;
    gap:8px;
    font-weight:700;
    font-size:18px;
    line-height:22px;
  }

  .catalog-label img{
    width:18px;
    height:18px;
    display:block;
  }

  .search-form{
    height:64px;
    min-width:360px;
    flex:1 1 auto;
    display:flex;
    align-items:center;
    border-radius:var(--radius);
    background:var(--bg-input-gray);
    transition:background .16s ease,box-shadow .16s ease;
  }

  .search-form:hover{
    background:#f0efef;
  }

  .search-form:focus-within{
    background:#fff;
    box-shadow:var(--focus-ring), inset 0 0 0 1px rgba(252,133,7,.45);
  }

  .search-input{
    width:100%;
    height:100%;
    padding:0 14px 0 20px;
    border:0;
    outline:0;
    background:transparent;
    color:var(--text-primary);
    font-size:16px;
    line-height:20px;
  }

  .search-input::placeholder{
    color:var(--text-tertiary);
  }

  .search-button{
    width:56px;
    height:56px;
    margin-right:4px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:var(--radius-small);
    background:transparent;
    transition:background .16s ease;
  }

  .search-button:hover{
    background:var(--controls-hover-gray);
  }

  .search-button:active{
    background:var(--controls-active-gray);
  }

  .search-button img{
    width:24px;
    height:24px;
    display:block;
  }

  .actions{
    display:flex;
    align-items:center;
    gap:2px;
    flex:0 0 auto;
  }

  .action{
    position:relative;
    width:86px;
    height:64px;
    padding:7px 6px 6px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:4px;
    border-radius:var(--radius);
    background:transparent;
    color:var(--text-secondary);
    transition:background .16s ease,color .16s ease,transform .16s ease;
  }

  .action:hover{
    background:var(--controls-hover-gray);
    color:var(--text-primary);
  }

  .action:active{
    background:var(--controls-active-gray);
    transform:translateY(1px);
  }

  .action:focus-visible,
  .brand-catalog:focus-visible,
  .search-button:focus-visible{
    outline:0;
    box-shadow:var(--focus-ring);
  }

  .action-icon{
    width:24px;
    height:24px;
    display:block;
  }

  .action-label{
    font-size:14px;
    line-height:16px;
  }

  .badge{
    position:absolute;
    top:5px;
    right:22px;
    min-width:18px;
    height:18px;
    padding:0 5px;
    display:flex;
    align-items:center;
    justify-content:center;
    border:2px solid var(--bg-secondary);
    border-radius:50px;
    background:var(--brand-orange);
    color:#fff;
    font-weight:700;
    font-size:11px;
    line-height:14px;
  }

  .avatar-stack{
    width:28px;
    height:28px;
    position:relative;
  }

  .avatar-stack img{
    position:absolute;
    display:block;
  }

  .avatar-photo{
    inset:4px;
    width:20px;
    height:20px;
    border-radius:50%;
    object-fit:cover;
  }

  .avatar-base{
    inset:0;
    width:28px;
    height:28px;
  }

  .avatar-subtract{
    left:-8px;
    top:-8px;
    width:44px;
    height:44px;
    opacity:.9;
  }

  .caption{
    width:min(1380px,calc(100vw - 48px));
    color:#666;
    font-size:14px;
    line-height:18px;
    text-align:center;
  }

  .caption code{
    padding:1px 5px;
    border-radius:5px;
    background:rgba(255,255,255,.65);
  }

  @media (max-width:1199px){
    .page{
      align-items:flex-start;
    }

    .header-shell{
      margin:0;
    }

    .caption{
      min-width:0;
      padding:0 24px;
      text-align:left;
    }
  }
</style>
</head>
<body>
  <main class="page">
    <div class="viewport" aria-label="Прокручиваемая область прототипа">
      <header class="header-shell" aria-label="Шапка магазина DNS">
        <div class="top-row">
          <div class="top-left">
            <div class="locale" aria-label="Язык интерфейса">
              <img class="flag" src="assets/flag-ru.svg" alt="">
              <span>Ru</span>
              <img class="chevron" src="assets/chevron-small.svg" alt="">
            </div>

            <div class="location">
              <img src="assets/map-pin.svg" alt="">
              <span>Москва</span>
            </div>

            <nav class="nav" aria-label="Верхняя навигация">
              <a class="nav-link" href="#">
                <span>DNS Видео</span>
                <span class="video-dot" aria-hidden="true"></span>
              </a>
              <a class="nav-link" href="#">Доставка</a>
              <a class="dropdown-link" href="#">
                <span>Покупателям</span>
                <img class="chevron" src="assets/chevron-small.svg" alt="">
              </a>
              <a class="nav-link" href="#">Юрлицам</a>
              <a class="nav-link" href="#">Клуб DNS</a>
              <a class="nav-link" href="#">Предложения брендов</a>
              <a class="dropdown-link" href="#">
                <span>Сотрудничество</span>
                <img class="chevron" src="assets/chevron-small.svg" alt="">
              </a>
            </nav>
          </div>

          <div class="top-right">
            <a class="phone" href="tel:88007707888">8-800-77-07-888</a>
          </div>
        </div>

        <div class="bottom-row">
          <button class="brand-catalog" type="button" aria-label="Открыть каталог">
            <img class="brand-logo" src="assets/dns-logo.svg" alt="DNS">
            <span class="catalog-divider" aria-hidden="true"></span>
            <span class="catalog-label">
              <span>Каталог</span>
              <img src="assets/dropdown-white.svg" alt="">
            </span>
          </button>

          <form class="search-form" action="#" role="search" aria-label="Поиск по сайту">
            <input class="search-input" type="search" name="q" placeholder="Поиск по сайту" autocomplete="off" aria-label="Поиск по сайту">
            <button class="search-button" type="submit" aria-label="Найти">
              <img src="assets/search.svg" alt="">
            </button>
          </form>

          <div class="actions" aria-label="Действия пользователя">
            <button class="action" type="button" aria-label="Сравнение, 1 товар">
              <img class="action-icon" src="assets/compare.svg" alt="">
              <span class="badge">1</span>
              <span class="action-label">Сравнение</span>
            </button>

            <button class="action" type="button" aria-label="Избранное, 15 товаров">
              <img class="action-icon" src="assets/wishlist.svg" alt="">
              <span class="badge">15</span>
              <span class="action-label">Избранное</span>
            </button>

            <button class="action" type="button" aria-label="Корзина, 3 товара на 1 260 рублей">
              <img class="action-icon" src="assets/cart.svg" alt="">
              <span class="badge">3</span>
              <span class="action-label">1 260 ₽</span>
            </button>

            <button class="action" type="button" aria-label="Профиль, 1 уведомление">
              <span class="avatar-stack" aria-hidden="true">
                <img class="avatar-photo" src="assets/avatar-photo.png" alt="">
                <img class="avatar-base" src="assets/avatar-base.svg" alt="">
                <img class="avatar-subtract" src="assets/avatar-subtract.svg" alt="">
              </span>
              <span class="badge">1</span>
              <span class="action-label">Профиль</span>
            </button>
          </div>
        </div>
      </header>
    </div>

    <p class="caption">Desktop header prototype from Figma node <code>5084:9448</code>. On narrow screens, scroll horizontally to inspect the 1380px layout.</p>
  </main>

<script>
  const searchForm = document.querySelector('.search-form');
  const searchInput = document.querySelector('.search-input');

  searchForm.addEventListener('submit', (event) => {
    event.preventDefault();
    searchInput.focus();
    if (!searchInput.value.trim()) {
      searchInput.value = 'Смартфоны';
      searchInput.select();
    }
  });
</script>
</body>
</html>
